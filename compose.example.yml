# Container Compose configuration for Tasmota Updater
# Compatible with both Docker and Podman using Python 3.11-slim optimized image
#
# Rename this file to compose.yml before use

services:
  tasmota-updater:
    build:
      context: .
      dockerfile: Containerfile
      args:
        - PYTHON_VERSION=3.11
    image: tasmota-updater:3.11-optimized
    container_name: tasmota-updater
    ports:
      - "5001:5001"
    volumes:
      - ./devices.yaml:/app/devices.yaml
      - ./logs:/app/logs
      - ./app/tasmota/cache:/app/app/tasmota/cache
    environment:
      # Use environment variable with fallback
      - DEVICES_FILE=${DEVICES_FILE:-devices.yaml}
      # SECRET_KEY: leave unset and the app generates an ephemeral random key at
      # startup. Set a strong, persistent value only if you need sessions to
      # survive restarts (the bundled UI currently uses no server-side sessions).
      - SECRET_KEY=${SECRET_KEY:-}
      - HOST=0.0.0.0
      - PORT=5001
      # Security settings
      # Keep false for plain-HTTP LAN use, otherwise the browser drops the UI
      # session cookie and the web UI can no longer reach the API. Set true only
      # when serving behind HTTPS/TLS.
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      # API_KEY is optional: the web UI authenticates via its session cookie.
      # Set a strong API_KEY only to allow programmatic X-API-Key clients.
      - API_KEY=${API_KEY:-}
      - SESSION_COOKIE_HTTPONLY=${SESSION_COOKIE_HTTPONLY:-true}
      - LOGGING_LEVEL=${LOGGING_LEVEL:-INFO}
      # No need to load .env in production container, use environment variables from compose.yml instead
      - ENV_FILE=
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-4}
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # slim image has no curl — use the Python stdlib instead
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
